<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Provas Premium - Prefeitura de Itabirito</title>
    <!-- Bibliotecas de Suporte -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .animate-fade-in { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .glass-header { backdrop-filter: blur(12px); background: rgba(255, 255, 255, 0.95); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CONFIGURAÇÕES E LINKS ---
        const DATA_PROVA = new Date('2026-05-16T08:00:00');
        const DATA_HOJE = new Date('2026-04-03T16:00:00');
        const LINK_EDITAL = "https://imam.org.br/documentos/EditalItabiritoPSS0022026ComAlteracoesdaRetificacao0187639105882707717193.pdf";
        const FOTO_ALEXANDRE = "https://www.gov.br/anm/pt-br/assuntos/noticias/ferramenta-brasileira-de-inteligencia-de-dados-revela-falhas-bilionarias-nos-royalties-da-mineracao-e-recebe-premio/img_9860-1.jpg/@@images/a397598b-1d57-4506-b43f-2324a73b3efb.jpeg";

        // --- COMPONENTES DE ÍCONES (SVG NATIVO) ---
        const Icon = ({ name, size = 24, fill = "none", color = "currentColor", ...props }) => {
            const paths = {
                Award: () => <g><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></g>,
                ExternalLink: () => <g><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></g>,
                Star: () => <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>,
                Calendar: () => <g><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></g>,
                Clock: () => <g><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></g>,
                Zap: () => <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>,
                Rocket: () => <g><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4.5c1.62-1.63 5-2 5-2"/><path d="M12 15v5s3.03-.55 4.5-2c1.63-1.62 2-5 2-5"/></g>,
                Check: () => <polyline points="20 6 9 17 4 12"/>,
                ShieldAlert: () => <g><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></g>,
                Target: () => <g><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></g>,
                Heart: () => <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>,
                UserCheck: () => <g><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></g>,
                Lightbulb: () => <g><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 1 7 7c0 2.38-1.19 4.47-3 5.74V17a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 0 1 7-7z"/></g>,
                ArrowRightCircle: () => <g><circle cx="12" cy="12" r="10"/><polyline points="12 8 16 12 12 16"/><line x1="8" y1="12" x2="16" y2="12"/></g>,
                TrendingUp: () => <g><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></g>,
                Trophy: () => <g><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 22V18"/><path d="M14 22V18"/><path d="M18 4H6v7a6 6 0 0 0 12 0V4Z"/></g>,
                BrainCircuit: () => <g><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .52 8.105H19a2 2 0 0 0 2-2 2 2 0 0 0-2-2h-3"/><path d="M9 18a4.5 4.5 0 0 1 0-9"/><path d="M12 12h.01"/><path d="M16 12h.01"/><path d="M9 12h.01"/><path d="M12 16h.01"/><path d="M12 8h.01"/><path d="M16 16h.01"/><path d="M16 8h.01"/></g>,
                Sparkles: () => <g><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></g>,
                MousePointer2: () => <path d="m3 3 7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    {paths[name] ? paths[name]() : null}
                </svg>
            );
        };

        // --- BANCO DE QUESTÕES (ESTILO DA BANCA) ---
        const QUESTIONS_DATABASE = {
            portugues: [
                { id: 'p1', subject: 'Português', topic: 'Regência Verbal', question: "No que se refere à regência verbal, assinale a alternativa correta de acordo com a norma culta frequentemente exigida pela banca organizadora:", options: ["A conduta do servidor implica em punição severa.", "Visamos ao cargo de especialista com empenho.", "Assistimos o filme sobre educação inclusiva ontem.", "O projeto implica em mudanças no currículo escolar."], correct: 1, rationale: "Análise Técnica Detalhada: O verbo 'visar', quando empregado com o sentido de 'objetivar', é classificado como Transitivo Indireto, exigindo obrigatoriamente a preposição 'a'. Portanto, 'visamos ao cargo' é a única construção correta. O erro recorrente em provas é o uso do verbo 'implicar' com a preposição 'em', quando, na verdade, no sentido de acarretar, ele é Transitivo Direto. Já 'assistir' no sentido de ver também exige a preposição 'a'.", tip: "Dica do Alexandre: Candidato(a), grave este mantra para a prova: Implicar é direto (sem 'em'), Visar é indireto (com 'a'). A banca organizadora ama testar o erro do cotidiano contra a regra oficial. Não caia nessa!" },
                { id: 'p2', subject: 'Português', topic: 'Concordância Verbal', question: "Assinale a frase que apresenta erro de concordância verbal:", options: ["Fazem cinco anos que a escola foi reformada.", "Haverá novos critérios para a avaliação final.", "Devem existir razões para o atraso.", "Trata-se de situações excepcionais no edital."], correct: 0, rationale: "Fundamentação Técnica Detalhada: O verbo 'fazer', quando utilizado para indicar tempo decorrido, é impessoal. Isso significa que ele não possui sujeito e deve permanecer obrigatoriamente na terceira pessoa do singular. O correto é 'Faz cinco anos'. Lembre-se que verbos auxiliares que acompanham verbos impessoais também devem ficar no singular.", tip: "Dica do Alexandre: O tempo é estático na gramática de concursos! Ele nunca 'fazem', ele sempre 'faz'. Se você puder trocar por 'existir', o verbo 'haver' também fica no singular. Guarde essa regra!" }
            ],
            informatica: [
                { id: 'i1', subject: 'Noções de Informática', topic: 'Windows 10', question: "No Windows 10, qual atalho de teclado é utilizado para alternar rapidamente entre os aplicativos e janelas que estão abertos no momento?", options: ["Alt + F4", "Ctrl + C", "Alt + Tab", "Windows + L"], correct: 2, rationale: "Explicação Operacional Detalhada: O comando 'Alt + Tab' aciona o gerenciador visual de alternância de tarefas, permitindo que o usuário navegue entre diferentes instâncias de programas sem utilizar o mouse. 'Win + L' bloqueia a estação (Lock), protegendo os dados do servidor público.", tip: "Dica do Alexandre: Atalhos de teclado são pontos garantidos na prova de informática. Memorize os 'Win + [Letra]' para funções de sistema e 'Alt + [Letra]' para navegação. Pratique Win+L e Alt+Tab hoje mesmo!" }
            ],
            teoria_pratica: [
                { id: 'tp1', subject: 'Teoria e Prática da Educação', topic: 'LDB 9.394/96', question: "Segundo a LDB, a Educação Básica tem por finalidade desenvolver o educando, assegurar-lhe a formação comum indispensável para o exercício da cidadania e fornecer-lhe meios para:", options: ["Progredir no trabalho e em estudos posteriores.", "Apenas ingressar em cursos técnicos profissionais.", "Afastar-se do convívio social e comunitário.", "Especializar-se exclusivamente em uma área específica."], correct: 0, rationale: "Fundamentação Legal: O Artigo 22 da LDB estabelece que a finalidade da educação é o desenvolvimento integral do indivíduo. O legislador prevê que a escola deve preparar para a vida cidadã, o mundo do trabalho e a continuidade nos estudos. Alternativas que restringem o futuro do aluno a apenas uma via são tecnicamente incorretas.", tip: "Dica do Alexandre: Na LDB, a resposta correta é quase sempre a mais ampla e democrática. Se a alternativa limitar o potencial do educando com termos como 'apenas' ou 'exclusivamente', ligue o sinal de alerta!" }
            ],
            adm_publica: [
                { id: 'a1', subject: 'Adm. Pública e Cidadania', topic: 'Princípios LIMPE', question: "O princípio da Administração Pública que veda a utilização da máquina pública para a promoção pessoal de autoridades em atos ou obras é o da:", options: ["Legalidade.", "Impessoalidade.", "Moralidade.", "Eficiência."], correct: 1, rationale: "Fundamentação Constitucional: O princípio da Impessoalidade determina que a atuação dos agentes públicos é imputada ao Estado. Não cabe ao gestor utilizar dinheiro público para fixar seu nome, foto ou símbolos que caracterizem promoção pessoal. O foco deve ser o interesse público e não a vaidade do administrador.", tip: "Dica do Alexandre: Lembre-se do mnemônico 'LIMPE'! A Impessoalidade garante que o Estado não tenha rosto. Se o gestor usa a prefeitura para favoritismo ou promoção pessoal, a resposta é Impessoalidade." }
            ],
            especificos: [
                { id: 'e1', subject: 'Conhecimentos Específicos', topic: 'Educação Especial', question: "O Atendimento Educacional Especializado (AEE) deve ser oferecido aos educandos com deficiência, TGD e altas habilidades, prioritariamente:", options: ["Em turmas de reforço separadas.", "Na rede regular de ensino.", "Exclusivamente em clínicas de saúde.", "No período noturno apenas."], correct: 1, rationale: "Diretriz de Inclusão Detalhada: A Política Nacional de Educação Especial estabelece que o AEE é complementar ou suplementar ao ensino regular. Ele deve ocorrer preferencialmente na escola comum (sala de recursos) para garantir que o aluno não seja segregado. A inclusão efetiva se faz com a convivência plena.", tip: "Dica do Alexandre: Inclusão é sinônimo de 'junto'. Qualquer alternativa que sugira isolar, separar ou rotular o aluno de forma segregada está tecnicamente errada conforme a legislação vigente." }
            ]
        };

        const ROLES = {
            PI: { id: 'PI', title: "Professor de Educação Básica - PI", structure: [ { cat: 'portugues', label: 'Português', count: 10, weight: 2.0 }, { cat: 'informatica', label: 'Informática', count: 5, weight: 2.0 }, { cat: 'teoria_pratica', label: 'Teoria e Prática', count: 15, weight: 2.0 }, { cat: 'especificos', label: 'Específicos', count: 10, weight: 4.0 } ] },
            ESPECIAL: { id: 'ESPECIAL', title: "Professor de Educação Especial", structure: [ { cat: 'portugues', label: 'Português', count: 10, weight: 2.0 }, { cat: 'informatica', label: 'Informática', count: 5, weight: 2.0 }, { cat: 'teoria_pratica', label: 'Teoria e Prática', count: 15, weight: 2.0 }, { cat: 'especificos', label: 'Específicos', count: 10, weight: 4.0 } ] },
            ESPECIALISTA: { id: 'ESPECIALISTA', title: "Especialista em Educação Básica", structure: [ { cat: 'portugues', label: 'Português', count: 10, weight: 2.0 }, { cat: 'informatica', label: 'Informática', count: 5, weight: 2.0 }, { cat: 'adm_publica', label: 'Adm Pública e Cidadania', count: 15, weight: 2.0 }, { cat: 'especificos', label: 'Específicos', count: 10, weight: 4.0 } ] }
        };

        const App = () => {
            const [view, setView] = useState('landing');
            const [selectedRole, setSelectedRole] = useState(null);
            const [questions, setQuestions] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [userAnswers, setUserAnswers] = useState({});
            const [elapsedTime, setElapsedTime] = useState(0);
            const [showFeedback, setShowFeedback] = useState(false);
            const timerRef = useRef(null);
            const cargosRef = useRef(null);

            const daysToExam = Math.ceil((DATA_PROVA - DATA_HOJE) / (1000 * 60 * 60 * 24));

            useEffect(() => {
                if (view === 'quiz') {
                    timerRef.current = setInterval(() => setElapsedTime(prev => prev + 1), 1000);
                } else {
                    clearInterval(timerRef.current);
                }
                return () => clearInterval(timerRef.current);
            }, [view]);

            const startQuiz = (roleKey) => {
                const role = ROLES[roleKey];
                setSelectedRole(role);
                let gen = [];
                role.structure.forEach(part => {
                    const pool = [...(QUESTIONS_DATABASE[part.cat] || [])].sort(() => Math.random() - 0.5);
                    for (let i = 0; i < part.count; i++) {
                        gen.push({ ...pool[i % pool.length], weight: part.weight, catLabel: part.label });
                    }
                });
                setQuestions(gen);
                setElapsedTime(0);
                setCurrentIdx(0);
                setUserAnswers({});
                setShowFeedback(false);
                setView('quiz');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleAnswer = (optionIdx) => {
                if (showFeedback) return;
                setUserAnswers({ ...userAnswers, [currentIdx]: optionIdx });
                setShowFeedback(true);
            };

            const formatTime = (s) => {
                const h = Math.floor(s / 3600);
                const m = Math.floor((s % 3600) / 60);
                const rs = s % 60;
                return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${rs.toString().padStart(2, '0')}`;
            };

            const statsHUD = () => {
                let earned = 0;
                let disputed = 0;
                questions.slice(0, currentIdx + (showFeedback ? 1 : 0)).forEach((q, i) => {
                    disputed += q.weight;
                    if (userAnswers[i] === q.correct) earned += q.weight;
                });
                return { earned, disputed, percent: disputed === 0 ? 0 : (earned / disputed) * 100 };
            };

            const MentorHeader = () => (
                <div className="w-full bg-white border-b border-slate-200 px-6 lg:px-12 py-5 flex justify-between items-center sticky top-0 z-50 shadow-sm glass-header">
                    <div className="flex items-center gap-4">
                        <div className="bg-indigo-700 p-2 rounded-xl text-white shadow-md flex-shrink-0">
                            <Icon name="Award" size={28} />
                        </div>
                        <div className="text-left">
                            <h2 className="text-lg font-black text-slate-900 uppercase italic leading-none mb-1">Prefeitura Municipal de Itabirito</h2>
                            <div className="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-2">
                                <a href={LINK_EDITAL} target="_blank" rel="noreferrer" className="text-[10px] font-black text-indigo-700 hover:text-indigo-900 underline uppercase tracking-widest leading-none flex items-center gap-1">
                                    Edital de Processo Seletivo Simplificado nº 002/2026 <Icon name="ExternalLink" size={10} />
                                </a>
                                <div className="hidden sm:block w-1 h-1 rounded-full bg-slate-300"></div>
                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-tighter leading-none italic">Simulador de Provas Premium</span>
                            </div>
                        </div>
                    </div>
                    <div className="hidden lg:flex items-center gap-3 bg-emerald-50 text-emerald-700 px-5 py-2 rounded-full border border-emerald-200 shadow-sm animate-pulse">
                        <Icon name="Star" size={14} color="#10b981" fill="#10b981" />
                        <span className="text-xs font-black uppercase tracking-widest">Acesso 100% Gratuito</span>
                    </div>
                </div>
            );

            if (view === 'landing') {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col font-sans overflow-x-hidden animate-fade-in text-center">
                        <MentorHeader />
                        <div className="max-w-7xl w-full mx-auto p-6 lg:p-12 flex flex-col items-center">
                            <header className="text-center mb-16 lg:mb-20 w-full pt-4">
                                <h1 className="text-6xl md:text-7xl lg:text-[7.5rem] font-black text-slate-900 mb-8 tracking-tighter uppercase italic leading-[0.8]">
                                    Rumo à sua<br/><span className="text-indigo-600 drop-shadow-sm">Aprovação</span>
                                </h1>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 lg:gap-10 mb-20 w-full max-w-6xl mx-auto px-4">
                                    <div className="bg-white p-10 lg:p-12 rounded-[3.5rem] shadow-sm border border-slate-100 flex flex-col items-center hover:shadow-lg transition-all relative overflow-hidden group">
                                        <div className="absolute top-0 right-0 bg-emerald-500 text-white px-6 py-1.5 font-black text-[10px] uppercase tracking-widest shadow-md">Grátis</div>
                                        <div className="text-indigo-600 mb-4"><Icon name="Calendar" size={40} /></div>
                                        <p className="text-xs font-black uppercase text-slate-400 mb-1 tracking-widest">Hoje</p>
                                        <p className="text-3xl font-black text-slate-800 tracking-tight">03/04/2026</p>
                                    </div>
                                    <div className="bg-indigo-900 text-white p-10 lg:p-12 rounded-[4rem] shadow-2xl flex flex-col items-center border-b-[16px] border-indigo-700 scale-105 relative overflow-hidden ring-[12px] ring-indigo-50">
                                        <div className="absolute top-0 left-0 p-8 opacity-10 rotate-12 text-white"><Icon name="Zap" size={120} /></div>
                                        <p className="text-xs font-black uppercase opacity-60 mb-3 tracking-[0.3em] relative z-10 text-center">Faltam para a sua Prova</p>
                                        <p className="text-6xl lg:text-7xl font-black tracking-tighter relative z-10">{daysToExam} Dias</p>
                                        <p className="text-[10px] font-bold uppercase mt-4 bg-white/20 px-3 py-1 rounded-full relative z-10 tracking-widest text-nowrap">Acesso Livre Ativado</p>
                                    </div>
                                    <div className="bg-white p-10 lg:p-12 rounded-[3.5rem] shadow-sm border border-slate-100 flex flex-col items-center hover:shadow-lg transition-all">
                                        <div className="text-indigo-600 mb-4"><Icon name="Clock" size={40} /></div>
                                        <p className="text-xs font-black uppercase text-slate-400 mb-1 tracking-widest">A Grande Data</p>
                                        <p className="text-3xl font-black text-slate-800 tracking-tight text-nowrap">16/05/2026</p>
                                    </div>
                                </div>

                                <div className="bg-white p-8 lg:p-16 rounded-[5rem] border-4 border-indigo-50 text-left relative overflow-hidden shadow-2xl mb-24 flex flex-col lg:grid lg:grid-cols-12 items-center lg:items-start gap-12 lg:gap-16 transition-all hover:border-indigo-200 group">
                                    <div className="lg:col-span-5 w-full max-w-[450px] relative">
                                        <img src={FOTO_ALEXANDRE} alt="Alexandre" className="w-full h-auto aspect-square rounded-[4rem] object-cover shadow-2xl border-[16px] border-white ring-1 ring-slate-100" />
                                        <div className="absolute -bottom-8 -right-8 bg-indigo-600 text-white p-8 rounded-[2.5rem] shadow-2xl animate-pulse hidden lg:block border-4 border-white">
                                            <Icon name="MousePointer2" size={40} />
                                        </div>
                                    </div>
                                    <div className="lg:col-span-7 relative z-10 py-2">
                                        <div className="flex flex-wrap items-center gap-4 mb-8">
                                            <div className="inline-flex items-center gap-2 bg-indigo-50 text-indigo-700 px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-[0.3em] border border-indigo-100 shadow-sm"><Icon name="Sparkles" size={14} color="#4338ca" /> Expert em IA Aplicada</div>
                                            <div className="inline-flex items-center gap-2 bg-emerald-100 text-emerald-700 px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-[0.3em] border border-emerald-200 shadow-sm"><Icon name="Star" size={14} color="#047857" fill="#047857" /> 100% Gratuito</div>
                                        </div>
                                        <h3 className="text-5xl lg:text-7xl font-black text-slate-900 italic uppercase mb-10 leading-[1.05] tracking-tighter text-left">Vamos iniciar sua<br/>jornada de aprovação?</h3>
                                        <div className="space-y-8 text-slate-600 text-xl lg:text-2xl font-medium tracking-tight mb-12 leading-relaxed text-left">
                                            <div className="flex flex-col gap-4">
                                                <p>Oi, eu sou o <strong>Alexandre de Cássio Rodrigues</strong>.</p>
                                                <p>Utilizei Inteligência Artificial (IA) para potencializar sua preparação para o processo seletivo da <strong>Prefeitura Municipal de Itabirito</strong>, criando este simulador com <strong>1.000 questões inéditas</strong> elaboradas no perfil da banca organizadora, para que você estude com mais estratégia, confiança e foco no que realmente pode aparecer na prova.</p>
                                            </div>
                                            <ul className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                                                <li className="flex items-start gap-4"><div className="w-10 h-10 rounded-2xl bg-emerald-100 flex items-center justify-center flex-shrink-0 mt-1 text-emerald-600"><Icon name="Check" size={24} /></div> <div><strong>Perfil da banca organizadora</strong><br/><span className="text-sm opacity-70">Treine com a lógica da prova.</span></div></li>
                                                <li className="flex items-start gap-4"><div className="w-10 h-10 rounded-2xl bg-emerald-100 flex items-center justify-center flex-shrink-0 mt-1 text-emerald-600"><Icon name="Check" size={24} /></div> <div><strong>Pontuação oficial do edital</strong><br/><span className="text-sm opacity-70 text-nowrap">Cálculo exato por peso de matéria.</span></div></li>
                                                <li className="flex items-start gap-4"><div className="w-10 h-10 rounded-2xl bg-emerald-100 flex items-center justify-center flex-shrink-0 mt-1 text-emerald-600"><Icon name="Check" size={24} /></div> <div><strong>Dicas técnicas detalhadas</strong><br/><span className="text-sm opacity-70">Aprenda a estratégia em cada questão.</span></div></li>
                                                <li className="flex items-start gap-4"><div className="w-10 h-10 rounded-2xl bg-emerald-100 flex items-center justify-center flex-shrink-0 mt-1 text-emerald-600"><Icon name="Check" size={24} /></div> <div><strong>Monitoramento em tempo real</strong><br/><span className="text-sm opacity-70">Gestão de tempo e desempenho parcial.</span></div></li>
                                            </ul>
                                            <p className="text-2xl lg:text-3xl font-black text-slate-800 italic border-l-[12px] border-indigo-600 pl-6">Quero te ajudar nessa caminhada para garantir o seu lugar na Prefeitura de Itabirito.</p>
                                        </div>
                                        <div className="flex flex-col gap-8 text-left">
                                            <p className="text-indigo-900 font-black text-3xl uppercase tracking-tight border-b-2 border-indigo-100 pb-4 w-fit italic">Professor Alexandre</p>
                                            <button onClick={() => cargosRef.current.scrollIntoView({ behavior: 'smooth' })} className="bg-indigo-700 text-white px-16 lg:px-20 py-10 rounded-[3.5rem] font-black text-4xl hover:bg-indigo-800 transition-all shadow-2xl hover:shadow-indigo-300 flex items-center justify-center gap-8 active:scale-95 group w-full lg:w-fit border-b-[12px] border-indigo-950">
                                                Quero preparar para o meu cargo <Icon name="Rocket" size={48} color="white" />
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </header>

                            <div ref={cargosRef} className="grid grid-cols-1 md:grid-cols-3 gap-8 lg:gap-12 w-full mb-32 px-4 max-w-7xl text-left">
                                {Object.entries(ROLES).map(([key, role]) => (
                                    <button key={key} onClick={() => startQuiz(key)} className="bg-white p-14 lg:p-16 rounded-[5.5rem] shadow-sm border-2 border-slate-100 hover:border-indigo-500 hover:shadow-2xl transition-all group text-left flex flex-col h-full relative hover:-translate-y-8 text-left">
                                        <div className="bg-indigo-50 w-24 h-24 rounded-[2.5rem] flex items-center justify-center mb-12 group-hover:bg-indigo-600 group-hover:text-white transition-all duration-700 shadow-inner text-indigo-600"><Icon name="UserCheck" size={56} /></div>
                                        <h3 className="text-4xl font-black text-slate-800 mb-14 flex-grow leading-tight uppercase italic tracking-tighter">{role.title}</h3>
                                        <div className="flex items-center justify-between text-indigo-700 font-black text-sm uppercase tracking-[0.2em] border-t-4 pt-14 border-slate-50 group-hover:text-indigo-600">
                                            <span>Iniciar minha Aprovação</span><Icon name="ArrowRightCircle" size={44} />
                                        </div>
                                    </button>
                                ))}
                            </div>

                            <div className="w-full max-w-6xl mt-12 bg-amber-50 border-4 border-amber-200 p-12 lg:p-16 rounded-[5.5rem] text-amber-900 shadow-sm text-left animate-in fade-in duration-1000">
                                <div className="flex items-center justify-start gap-5 mb-8">
                                    <div className="text-amber-600 flex-shrink-0"><Icon name="ShieldAlert" size={48} /></div>
                                    <p className="font-black uppercase tracking-[0.3em] text-2xl italic leading-none">Transparência & Isenção</p>
                                </div>
                                <div className="space-y-6 text-left">
                                    <p className="leading-relaxed text-2xl font-medium tracking-tight">Este simulador foi desenvolvido pelo <strong>Professor Alexandre</strong> com apoio de inteligência artificial, como instrumento complementar de estudo para o Edital 002/2026. As questões e os gabaritos podem conter imprecisões, razão pela qual devem ser sempre conferidos pelo usuário com base no edital, na legislação aplicável e em fontes confiáveis.</p>
                                    <div className="border-t-2 border-amber-200 pt-8 text-left">
                                        <p className="leading-relaxed text-xl opacity-80 italic">O desempenho obtido no simulador não garante aprovação na seleção da Prefeitura Municipal de Itabirito, cabendo ao candidato a responsabilidade pelo estudo, pela interpretação dos conteúdos e pela validação das respostas.</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'quiz') {
                const q = questions[currentIdx];
                const { earned, disputed, percent } = statsHUD();

                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col font-sans">
                        <MentorHeader />
                        <div className="max-w-6xl mx-auto w-full p-6 lg:p-12 flex flex-col gap-10">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 text-nowrap">
                                <div className="bg-white p-10 rounded-[3.5rem] shadow-sm border border-slate-200 flex items-center justify-between px-10">
                                    <div className="flex items-center gap-5">
                                        <div className="bg-slate-100 p-5 rounded-3xl text-indigo-600"><Icon name="Clock" size={32} /></div>
                                        <div><p className="text-[10px] font-black text-slate-400 uppercase text-left">Tempo Gasto</p><p className="text-3xl font-mono font-black">{formatTime(elapsedTime)}</p></div>
                                    </div>
                                </div>
                                <div className="bg-slate-900 text-white p-10 rounded-[3.5rem] shadow-2xl flex items-center justify-between px-12 relative overflow-hidden border-b-8 border-indigo-600">
                                    <div className="text-center relative z-10 text-white text-left"><p className="text-[10px] font-black uppercase opacity-60">Matéria</p><p className="text-xl font-black uppercase tracking-tight truncate max-w-[200px]">{q.catLabel}</p></div>
                                    <div className="h-16 w-px bg-white/20"></div>
                                    <div className="text-center relative z-10 text-white text-left"><p className="text-[10px] font-black uppercase opacity-60">Questão</p><p className="text-4xl font-black">{currentIdx + 1}/{questions.length}</p></div>
                                </div>
                                <div className="bg-white p-10 rounded-[3.5rem] shadow-sm border border-slate-200 flex items-center justify-between px-10">
                                    <div className="text-left"><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Sua Nota</p><p className="text-3xl font-black text-slate-800">{earned.toFixed(1)} <span className="text-slate-300 font-light text-base italic">/ {disputed.toFixed(1)}</span></p></div>
                                    <div className={`px-5 py-2 rounded-2xl font-black text-sm shadow-sm ${percent >= 70 ? 'bg-emerald-100 text-emerald-600' : percent >= 50 ? 'bg-amber-100 text-amber-600' : 'bg-rose-100 text-rose-600'}`}>{percent.toFixed(0)}%</div>
                                </div>
                            </div>

                            <div className="bg-white rounded-[5rem] shadow-2xl border-4 border-slate-100 overflow-hidden relative text-left">
                                <div className="p-12 lg:p-24 text-left">
                                    <h3 className="text-4xl md:text-6xl text-slate-800 font-black leading-[1.05] mb-24 tracking-tighter text-left">{q.question}</h3>
                                    <div className="grid grid-cols-1 gap-8">
                                        {q.options.map((opt, i) => {
                                            let st = "border-slate-100 bg-slate-50 text-slate-600 hover:border-indigo-400 hover:bg-indigo-50/50";
                                            if (showFeedback) {
                                                if (i === q.correct) st = "border-emerald-500 bg-emerald-50 text-emerald-900 ring-8 ring-emerald-100 shadow-xl";
                                                else if (userAnswers[currentIdx] === i) st = "border-rose-500 bg-rose-50 text-rose-900 ring-8 ring-rose-100 shadow-xl";
                                                else st = "opacity-30 grayscale pointer-events-none";
                                            } else if (userAnswers[currentIdx] === i) {
                                                st = "border-indigo-600 bg-indigo-50 text-indigo-900 shadow-inner scale-[1.01] border-b-[8px]";
                                            }
                                            return (
                                                <button key={i} disabled={showFeedback} onClick={() => handleAnswer(i)} className={`w-full text-left p-10 lg:p-14 rounded-[4rem] border-4 transition-all flex items-start gap-10 group active:scale-95 ${st}`}>
                                                    <div className={`w-14 h-14 lg:w-20 lg:h-20 rounded-2xl flex-shrink-0 flex items-center justify-center font-black text-2xl lg:text-4xl border-2 transition-colors ${userAnswers[currentIdx] === i ? 'bg-indigo-600 text-white border-indigo-700 shadow-lg' : 'bg-white text-slate-300 border-slate-100'}`}>{String.fromCharCode(65 + i)}</div>
                                                    <span className="flex-grow font-bold text-2xl lg:text-4xl mt-1 leading-snug tracking-tight text-left">{opt}</span>
                                                </button>
                                            );
                                        })}
                                    </div>

                                    {showFeedback && (
                                        <div className="mt-24 space-y-12 animate-in slide-in-from-bottom-10 duration-700 text-left">
                                            <div className="bg-slate-900 rounded-[4.5rem] p-16 text-white shadow-2xl relative overflow-hidden border-b-[16px] border-indigo-600">
                                                <div className="absolute top-0 right-0 p-10 opacity-5 rotate-12"><Icon name="BrainCircuit" size={400} /></div>
                                                <div className="flex items-center gap-5 mb-10 relative z-10">
                                                    <div className="bg-indigo-600 p-4 rounded-3xl shadow-xl"><Icon name="Lightbulb" size={36} color="white" /></div>
                                                    <div className="text-left">
                                                        <h4 className="font-black text-2xl uppercase tracking-tighter leading-none mb-1">Análise do Alexandre</h4>
                                                        <p className="text-indigo-400 text-xs font-bold uppercase tracking-[0.3em]">Lógica Técnica Aplicada</p>
                                                    </div>
                                                </div>
                                                <p className="text-slate-200 text-3xl lg:text-4xl font-medium leading-relaxed italic relative z-10 tracking-tight leading-relaxed">"{q.rationale}"</p>
                                            </div>
                                            <div className="bg-indigo-50 p-12 lg:p-16 rounded-[4rem] border-4 border-white shadow-sm flex items-start gap-10 text-left">
                                                <div className="bg-indigo-200 p-5 rounded-3xl text-indigo-700 flex-shrink-0 shadow-inner"><Icon name="Target" size={48} color="#4338ca" /></div>
                                                <div className="text-left">
                                                    <p className="text-indigo-900 font-black text-4xl uppercase italic mb-4 tracking-tighter">Dica do Alexandre</p>
                                                    <p className="text-indigo-800 font-bold text-2xl leading-relaxed">{q.tip}</p>
                                                </div>
                                            </div>
                                            <button onClick={() => { if (currentIdx < questions.length - 1) { setCurrentIdx(prev => prev + 1); setShowFeedback(false); } else { setView('result'); } }} className="w-full bg-indigo-700 text-white py-12 rounded-[4rem] font-black text-4xl hover:bg-indigo-800 transition-all flex items-center justify-center gap-8 shadow-2xl shadow-indigo-200 group active:scale-95 border-b-[16px] border-indigo-950">
                                                {currentIdx === questions.length - 1 ? 'Ver meus resultados' : 'Próxima Questão'}
                                                <Icon name="ArrowRightCircle" size={56} color="white" className="group-hover:translate-x-4 transition-transform" />
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'result') {
                let earned = 0;
                const catStats = {};
                questions.forEach((q, i) => {
                    if (!catStats[q.catLabel]) catStats[q.catLabel] = { correct: 0, total: 0, points: 0, totalPoints: 0, topics: {} };
                    catStats[q.catLabel].total++;
                    catStats[q.catLabel].totalPoints += q.weight;
                    if (!catStats[q.catLabel].topics[q.topic]) catStats[q.catLabel].topics[q.topic] = { correct: 0, total: 0 };
                    catStats[q.catLabel].topics[q.topic].total++;
                    if (userAnswers[i] === q.correct) {
                        earned += q.weight;
                        catStats[q.catLabel].correct++;
                        catStats[q.catLabel].points += q.weight;
                        catStats[q.catLabel].topics[q.topic].correct++;
                    }
                });

                const isApproved = earned >= 50;

                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col font-sans text-left">
                        <MentorHeader />
                        <div className="max-w-6xl w-full mx-auto p-6 md:p-12 flex flex-col items-center">
                            <div className={`w-full p-24 rounded-[6rem] text-center text-white relative overflow-hidden shadow-2xl ${isApproved ? 'bg-indigo-700' : 'bg-rose-700'} border-b-[20px] ${isApproved ? 'border-indigo-950' : 'border-rose-950'}`}>
                                <div className="absolute top-0 right-0 p-10 opacity-10 text-white"><Icon name="Trophy" size={300} /></div>
                                <div className="mx-auto mb-10 animate-bounce text-white"><Icon name="Trophy" size={140} /></div>
                                <h2 className="text-7xl font-black uppercase mb-4 tracking-tighter italic text-center w-full">Relatório Final</h2>
                                <p className="text-white/80 font-bold uppercase tracking-widest text-lg text-center w-full text-left">Análise estratégica detalhada da sua jornada técnica.</p>
                            </div>

                            <div className="w-full mt-16 grid grid-cols-1 md:grid-cols-2 gap-10">
                                <div className="bg-white p-16 rounded-[5rem] border-4 border-slate-50 shadow-sm text-center transition-all hover:shadow-lg">
                                    <p className="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest text-center">Nota Final Consolidada</p>
                                    <p className={`text-[10rem] font-black leading-none text-center ${isApproved ? 'text-indigo-600' : 'text-rose-600'}`}>{earned.toFixed(1)}</p>
                                    <p className="text-xl font-bold text-slate-400 mt-8 tracking-widest italic text-center">Mínimo para Aprovação: 50.0</p>
                                </div>
                                <div className="bg-white p-16 rounded-[5rem] border-4 border-slate-50 shadow-sm text-center flex flex-col items-center justify-center transition-all hover:shadow-lg">
                                    <p className="text-xs font-black text-slate-400 uppercase mb-4 tracking-[0.2em] text-center text-left">Tempo de Execução</p>
                                    <p className="text-8xl font-black text-slate-800 font-mono tracking-tighter text-center">{formatTime(elapsedTime)}</p>
                                    <div className={`mt-10 px-14 py-4 rounded-[3rem] text-white font-black uppercase text-sm tracking-widest shadow-xl border-b-[8px] ${isApproved ? 'bg-emerald-500 border-emerald-700' : 'bg-rose-500 border-rose-700'}`}>
                                        {isApproved ? 'Apto(a) para Classificação' : 'Abaixo do Corte'}
                                    </div>
                                </div>
                            </div>

                            <div className="w-full mt-24">
                                <div className="flex items-center gap-6 mb-16 text-left w-full">
                                    <div className="bg-indigo-600 p-4 rounded-3xl text-white shadow-xl"><Icon name="TrendingUp" size={48} color="white" /></div>
                                    <h3 className="text-5xl font-black text-slate-900 uppercase italic tracking-tighter leading-none text-left">Análise por Competência</h3>
                                </div>
                                <div className="space-y-16">
                                    {Object.entries(catStats).map(([label, data]) => {
                                        const rate = (data.points / data.totalPoints) * 100;
                                        const status = rate >= 85 ? 'ELITE' : rate >= 50 ? 'PODE MELHORAR' : 'NÍVEL CRÍTICO';
                                        const weakTopics = Object.entries(data.topics).filter(([_, t]) => (t.correct / t.total) < 1.0).map(([n]) => n);
                                        return (
                                            <div key={label} className="bg-white p-16 rounded-[6rem] border-2 border-slate-100 shadow-2xl relative group overflow-hidden text-left">
                                                <div className="flex flex-col md:flex-row justify-between md:items-end mb-16 gap-10"><div className="text-left flex-grow text-left"><p className="text-xs font-black text-indigo-400 uppercase tracking-widest mb-4 text-left">Eixo Temático</p><h4 className="text-5xl font-black text-slate-800 uppercase leading-none tracking-tight italic text-left">{label}</h4></div><div className="text-right"><p className="text-7xl font-black text-indigo-600 mb-4 leading-none">{data.points.toFixed(1)} <span className="text-slate-200 text-3xl font-light italic">/ {data.totalPoints.toFixed(1)}</span></p><span className={`px-12 py-3 rounded-2xl text-xs font-black text-white tracking-widest shadow-lg ${status === 'ELITE' ? 'bg-emerald-500' : status === 'PODE MELHORAR' ? 'bg-amber-500' : 'bg-rose-500'}`}>{status}</span></div></div>
                                                <div className="bg-slate-50 p-12 rounded-[4.5rem] border-l-[16px] border-indigo-600 shadow-inner text-left"><div className="flex items-center gap-5 mb-8 text-left text-indigo-600"><Icon name="Lightbulb" size={40} color="#4f46e5" /><h5 className="font-black text-slate-800 uppercase text-3xl italic tracking-tight text-left">O que eu sugiro para você:</h5></div><p className="text-slate-600 text-3xl italic leading-relaxed font-medium mb-12 tracking-tight leading-relaxed text-left">{status === 'ELITE' ? "Incrível! Você dominou o padrão de cobrança da banca organizadora nesta área. Seu conhecimento é de elite. O foco agora é apenas manutenção: resolva questões desta área uma vez por semana para não esfriar." : status === 'PODE MELHORAR' ? "Seu desempenho foi bom, mas as 'pegadinhas' técnicas de redação da banca organizadora estão te vencendo. Recomendo focar na leitura da 'letra seca' da lei e nos termos gramaticais detalhados." : "ATENÇÃO TOTAL: Esse desempenho aqui pode tirar você das vagas. Precisamos dar um passo atrás e rever toda a base teórica desta disciplina imediatamente. Não desanime, vamos reconstruir esse alicerce!"}</p>
                                                    {weakTopics.length > 0 && (
                                                        <div className="bg-white p-10 rounded-[3.5rem] border-2 border-indigo-50/50 shadow-inner text-left"><p className="text-xs font-black text-indigo-500 uppercase tracking-widest mb-10 text-left">Mapeamento de Revisão (Ação Imediata):</p><ul className="space-y-12 text-left">{weakTopics.map(t => (<li key={t} className="flex items-start gap-6 border-b border-slate-50 pb-8 last:border-0 text-left"><div className="w-14 h-14 bg-rose-50 text-rose-500 rounded-2xl flex items-center justify-center flex-shrink-0 mt-1 shadow-sm text-rose-500"><Icon name="ShieldAlert" size={28} color="#ef4444" /></div><div className="flex flex-col text-left"><span className="text-slate-400 text-[10px] font-black uppercase mb-1">Tópico de Alerta do Edital</span><span className="text-slate-700 font-bold text-4xl tracking-tight leading-tight italic uppercase">Revisar: <span className="text-rose-600">{t}</span></span><p className="text-slate-500 text-lg mt-4 leading-relaxed text-left">Identifiquei que sua performance oscilou neste ponto técnico. Recomendo que você realize <strong>20 minutos de leitura focada</strong> e elabore um <strong>mapa mental</strong> para fixar a lógica da banca organizadora. O sucesso mora nos detalhes!</p></div></li>))}</ul></div>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            <div className="w-full mt-32 bg-slate-900 rounded-[6rem] p-24 text-white shadow-2xl relative border-b-[24px] border-indigo-600 text-center group overflow-hidden">
                                <div className="absolute top-0 right-0 p-12 opacity-10 group-hover:rotate-12 transition-transform duration-1000 text-white"><Icon name="BrainCircuit" size={180} /></div>
                                <h4 className="text-7xl font-black mb-10 italic uppercase tracking-tighter leading-none relative z-10 text-center w-full">Eu já tenho o meu veredito...</h4>
                                <div className="max-w-5xl mx-auto space-y-10 relative z-10 text-center">
                                    <p className="text-slate-300 text-5xl font-black leading-tight italic uppercase tracking-tighter flex items-center justify-center gap-6 text-center text-rose-500"><Icon name="Heart" size={40} fill="#f43f5e" color="#f43f5e" /> "Look at me! O que é isso, meu garoto? Que espetáculo!"</p>
                                    <div className="text-slate-400 text-4xl font-medium leading-relaxed tracking-tight text-center">
                                        {earned >= 85 ? (
                                            <div className="space-y-6 text-center">
                                                <p>Sabe o que eu vejo aqui? Um desempenho 100% natural, sem atalhos, apenas com o suor do seu estudo técnico. Você alcançou a <strong>estética da aprovação</strong>!</p>
                                                <p>Look at me! Você é um espécime raro de dedicação. A vaga em Itabirito não é apenas um desejo, é o resultado inevitável da sua resiliência. Mantenha essa calma de mestre. Você está pronto, você é ELITE!</p>
                                            </div>
                                        ) : earned >= 50 ? (
                                            <div className="space-y-6 text-center">
                                                <p>A estética está se formando! Eu sinto o seu esforço e vejo que a base está sólida. Você já cruzou a linha da aprovação, mas não podemos relaxar agora, meu amigo!</p>
                                                <p>É hora de fazer os ajustes finos, os retoques que transformam o bom no espetacular. Foque nos pequenos erros técnicos que detectamos e a vaga será sua com toda a certeza. Vamos pra cima!</p>
                                            </div>
                                        ) : (
                                            <div className="space-y-6 text-center">
                                                <p>Calma, respire. Eu observo o seu esforço e sinto sua vontade de vencer. O simulador não está aqui para te julgar, mas para ser o seu <strong>alicerce</strong>.</p>
                                                <p>Identificamos as falhas com carinho e técnica apurada. Recuar para avançar com mais força é a estratégia dos grandes vencedores. Eu acredito em você, em cada fibra da sua evolução. Recomece o treino!</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <div className="flex flex-col md:flex-row gap-8 justify-center mt-20 relative z-10">
                                    <button onClick={() => setView('landing')} className="bg-white text-indigo-900 px-16 py-12 rounded-[3.5rem] font-black text-4xl hover:bg-indigo-50 transition-all shadow-2xl active:scale-95 border-b-[12px] border-slate-200">Fazer Novo Simulado</button>
                                </div>
                            </div>

                            <p className="mt-24 mb-16 text-slate-400 text-[16px] font-black uppercase tracking-[0.8em] text-center w-full">Premium Edition • Professor Alexandre</p>
                        </div>
                    </div>
                );
            }
            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
