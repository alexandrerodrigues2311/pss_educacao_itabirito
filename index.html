<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Provas Premium - Itabirito</title>
    <!-- Bibliotecas de Suporte -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-header { backdrop-filter: blur(12px); background: rgba(255, 255, 255, 0.95); }
        /* Otimização para visualização em Notebooks comuns */
        @media (max-height: 850px) {
            .quest-title { font-size: 1.75rem !important; line-height: 1.2 !important; }
            .opt-btn { padding: 1rem !important; }
            .opt-text { font-size: 1rem !important; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 selection:bg-indigo-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CONFIGURAÇÕES ---
        const DATA_PROVA = new Date('2026-05-16T08:00:00');
        const DATA_HOJE = new Date('2026-04-03T16:00:00');
        const LINK_EDITAL = "https://imam.org.br/documentos/EditalItabiritoPSS0022026ComAlteracoesdaRetificacao0187639105882707717193.pdf";
        const FOTO_ALEXANDRE = "https://www.gov.br/anm/pt-br/assuntos/noticias/ferramenta-brasileira-de-inteligencia-de-dados-revela-falhas-bilionarias-nos-royalties-da-mineracao-e-recebe-premio/img_9860-1.jpg/@@images/a397598b-1d57-4506-b43f-2324a73b3efb.jpeg";

        // --- COMPONENTES DE ÍCONES ---
        const Icon = ({ name, size = 24, fill = "none", color = "currentColor", ...props }) => {
            const paths = {
                Award: () => <g><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></g>,
                ExternalLink: () => <g><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></g>,
                Star: () => <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>,
                Calendar: () => <g><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></g>,
                Clock: () => <g><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></g>,
                Zap: () => <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>,
                Rocket: () => <g><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4.5c1.62-1.63 5-2 5-2"/><path d="M12 15v5s3.03-.55 4.5-2c1.63-1.62 2-5 2-5"/></g>,
                Check: () => <polyline points="20 6 9 17 4 12"/>,
                ShieldAlert: () => <g><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></g>,
                Heart: () => <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>,
                UserCheck: () => <g><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></g>,
                Lightbulb: () => <g><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 1 7 7c0 2.38-1.19 4.47-3 5.74V17a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 0 1 7-7z"/></g>,
                ArrowRightCircle: () => <g><circle cx="12" cy="12" r="10"/><polyline points="12 8 16 12 12 16"/><line x1="8" y1="12" x2="16" y2="12"/></g>,
                TrendingUp: () => <g><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></g>,
                Trophy: () => <g><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 22V18"/><path d="M14 22V18"/><path d="M18 4H6v7a6 6 0 0 0 12 0V4Z"/></g>,
                BrainCircuit: () => <g><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .52 8.105H19a2 2 0 0 0 2-2 2 2 0 0 0-2-2h-3"/><path d="M9 18a4.5 4.5 0 0 1 0-9"/><path d="M12 12h.01"/><path d="M16 12h.01"/><path d="M9 12h.01"/><path d="M12 16h.01"/><path d="M12 8h.01"/><path d="M16 16h.01"/><path d="M16 8h.01"/></g>,
                Sparkles: () => <g><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></g>,
                MousePointer2: () => <path d="m3 3 7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>,
                Target: () => <g><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></g>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    {paths[name] ? paths[name]() : null}
                </svg>
            );
        };

        // --- BANCO DE QUESTÕES EXPANDIDO ---
        // Este banco simula a distribuição proporcional solicitada.
        const QUESTIONS_DATABASE = {
            portugues: [
                { id: 'p1', subject: 'Português', topic: 'Regência Verbal', question: "No que se refere à regência verbal, assinale a alternativa correta de acordo com a norma culta frequentemente exigida pela banca organizadora:", options: ["A conduta do servidor implica em punição severa.", "Visamos ao cargo de especialista com empenho.", "Assistimos o filme sobre educação inclusiva ontem.", "O projeto implica em mudanças no currículo escolar."], correct: 1, rationale: "Análise Técnica Detalhada: O verbo 'visar', quando empregado com o sentido de 'objetivar', é classificado sintaticamente como Transitivo Indireto, exigindo obrigatoriamente a preposição 'a'. O erro recorrente em provas é o uso de 'implicar' com a preposição 'em', quando, na verdade, no sentido de 'acarretar', ele é Transitivo Direto. Verbo 'assistir' (ver) também exige 'a'.", tip: "Memorize a tríade: Visar (a), Assistir (a) e Implicar (algo). O 'implicar' é ciumento e não aceita a preposição 'em'. Se vir 'implica em' na prova, descarte!" },
                { id: 'p2', subject: 'Português', topic: 'Concordância Verbal', question: "Assinale a frase que apresenta erro de concordância verbal, considerando a norma-padrão:", options: ["Fazem cinco anos que a escola foi reformada.", "Haverá novos critérios para a avaliação final.", "Devem existir razões para o atraso administrativo.", "Trata-se de situações excepcionais previstas no edital."], correct: 0, rationale: "Fundamentação Técnica: O verbo 'fazer', indicando tempo decorrido, é impessoal e deve permanecer obrigatoriamente na 3ª pessoa do singular. A forma 'Fazem cinco anos' projeta um plural inexistente na norma culta. O correto é 'Faz cinco anos'. Verbos auxiliares em locuções com impessoais também ficam no singular.", tip: "O tempo não 'fazem', ele sempre 'faz'. Se você puder substituir o verbo 'haver' por 'existir', ele também fica congelado no singular." },
                { id: 'p3', subject: 'Português', topic: 'Crase', question: "Assinale a opção em que o uso do acento indicativo de crase é facultativo:", options: ["Refiro-me à professora de matemática.", "Entregamos o prêmio à sua irmã.", "Vou à Itabirito amanhã cedo.", "Não assisto à filmes violentos."], correct: 1, rationale: "A crase é facultativa diante de pronomes possessivos femininos no singular (minha, tua, sua, nossa).", tip: "Pense no trio facultativo: possessivos femininos, nomes próprios femininos e depois da preposição 'até'." },
                { id: 'p4', subject: 'Português', topic: 'Pontuação', question: "Indique a frase em que a vírgula foi utilizada corretamente para separar um aposto explicativo:", options: ["Itabirito, a terra do ferro, é uma cidade histórica.", "Os alunos, estudaram muito para o simulado.", "Ontem à noite, choveu bastante no centro.", "Pedro comprou, canetas, lápis e borracha."], correct: 0, rationale: "Aposto explicativo deve vir isolado por vírgulas.", tip: "Aposto é uma 'fofoca explicativa'. Se você pode tirar o termo e a frase continua fazendo sentido, use vírgulas!" }
            ],
            informatica: [
                { id: 'i1', subject: 'Informática', topic: 'Windows 10', question: "No Windows 10, qual atalho de teclado permite bloquear instantaneamente a estação de trabalho para segurança?", options: ["Windows + L", "Ctrl + Alt + Del", "Alt + F4", "Windows + D"], correct: 0, rationale: "O atalho Windows + L (Lock) bloqueia a sessão do usuário imediatamente.", tip: "L de Lock. Segurança em primeiro lugar na repartição pública!" },
                { id: 'i2', subject: 'Informática', topic: 'Microsoft Word', question: "No Word 365, para centralizar um parágrafo selecionado, utiliza-se o comando:", options: ["Ctrl + E", "Ctrl + C", "Ctrl + J", "Ctrl + M"], correct: 0, rationale: "No Word em português, Ctrl + E centraliza o texto.", tip: "E de Eixo. Centralizar no eixo!" },
                { id: 'i3', subject: 'Informática', topic: 'Microsoft Excel', question: "Qual função do Excel deve ser usada para somar um intervalo de células de forma automática?", options: ["=SOMA()", "=TOTAL()", "=ADIC()", "=SOMASER()"], correct: 0, rationale: "A função básica para adição de valores é =SOMA().", tip: "No Excel em português, as funções são bem diretas. SOMA é SOMA." },
                { id: 'i4', subject: 'Informática', topic: 'Segurança', question: "Qual o nome da técnica que consiste em enviar e-mails falsos fingindo ser de instituições confiáveis para roubar senhas?", options: ["Phishing", "Firewall", "Cookies", "Backup"], correct: 0, rationale: "Phishing vem de 'pescar' dados de usuários incautos através de iscas digitais.", tip: "Pense em 'Fishing' (pescaria). Eles jogam a isca e você morderia se não estudasse!" },
                { id: 'i5', subject: 'Informática', topic: 'Hardware', question: "Qual componente é considerado o 'cérebro' do computador, responsável por processar as instruções?", options: ["CPU (Processador)", "Memória RAM", "Disco Rígido (HD)", "Placa de Vídeo"], correct: 0, rationale: "A Unidade Central de Processamento (CPU) executa todos os cálculos e lógica do sistema.", tip: "CPU = Cérebro. Sem ela, o computador é apenas uma caixa de metal." }
            ],
            teoria_pratica: [
                { id: 'tp1', subject: 'Teoria e Prática', topic: 'LDB 9394/96', question: "Segundo a LDB, a Educação Básica tem por finalidade desenvolver o educando, assegurar-lhe a formação comum indispensável para a cidadania e fornecer-lhe meios para:", options: ["Progredir no trabalho e em estudos posteriores.", "Apenas ingressar no ensino superior.", "Especializar-se em uma área técnica única.", "Isolamento comunitário preventivo."], correct: 0, rationale: "Artigo 22 da LDB foca no desenvolvimento pleno e preparo para o trabalho.", tip: "A LDB é democrática. Se a resposta for restritiva ('apenas'), desconfie!" },
                { id: 'tp2', subject: 'Teoria e Prática', topic: 'ECA', question: "De acordo com o Estatuto da Criança e do Adolescente (ECA), é dever de quem assegurar à criança a prioridade absoluta?", options: ["Família, comunidade, sociedade e poder público.", "Apenas os pais.", "Somente o Estado.", "Apenas a escola."], correct: 0, rationale: "O Artigo 4º do ECA divide a responsabilidade entre todos os níveis sociais.", tip: "Prioridade absoluta = Responsabilidade de todos!" }
            ],
            adm_publica: [
                { id: 'a1', subject: 'Adm. Pública', topic: 'Art. 37 CF', question: "O princípio constitucional que veda a promoção pessoal de agentes públicos em obras governamentais é o da:", options: ["Impessoalidade.", "Legalidade.", "Moralidade.", "Eficiência."], correct: 0, rationale: "Pela Impessoalidade, os atos são da instituição e não da pessoa física.", tip: "LIMPE! Impessoalidade = O Estado não tem rosto." }
            ],
            especificos: [
                { id: 'e1', subject: 'Conhecimentos Específicos', topic: 'Inclusão', question: "O Atendimento Educacional Especializado (AEE) deve ocorrer prioritariamente:", options: ["Na rede regular de ensino.", "Em classes segregadas.", "Em domicílio apenas.", "Em hospitais parceiros."], correct: 0, rationale: "A política nacional de inclusão exige a convivência na rede regular.", tip: "Inclusão é JUNTO. Rede regular é a resposta certa." }
            ]
        };

        const ROLES = {
            PI: { id: 'PI', title: "Professor de Educação Básica - PI", structure: [ { cat: 'portugues', label: 'Português', count: 10, weight: 2.0 }, { cat: 'informatica', label: 'Informática', count: 5, weight: 2.0 }, { cat: 'teoria_pratica', label: 'Teoria e Prática', count: 15, weight: 2.0 }, { cat: 'especificos', label: 'Específicos', count: 10, weight: 4.0 } ] },
            ESPECIAL: { id: 'ESPECIAL', title: "Professor de Educação Especial", structure: [ { cat: 'portugues', label: 'Português', count: 10, weight: 2.0 }, { cat: 'informatica', label: 'Informática', count: 5, weight: 2.0 }, { cat: 'teoria_pratica', label: 'Teoria e Prática', count: 15, weight: 2.0 }, { cat: 'especificos', label: 'Específicos', count: 10, weight: 4.0 } ] },
            ESPECIALISTA: { id: 'ESPECIALISTA', title: "Especialista em Educação Básica", structure: [ { cat: 'portugues', label: 'Português', count: 10, weight: 2.0 }, { cat: 'informatica', label: 'Informática', count: 5, weight: 2.0 }, { cat: 'adm_publica', label: 'Adm Pública', count: 15, weight: 2.0 }, { cat: 'especificos', label: 'Específicos', count: 10, weight: 4.0 } ] }
        };

        const App = () => {
            const [view, setView] = useState('landing');
            const [selectedRole, setSelectedRole] = useState(null);
            const [questions, setQuestions] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [userAnswers, setUserAnswers] = useState({});
            const [elapsedTime, setElapsedTime] = useState(0);
            const [showFeedback, setShowFeedback] = useState(false);
            const timerRef = useRef(null);
            const cargosRef = useRef(null);

            const daysToExam = Math.ceil((DATA_PROVA - DATA_HOJE) / (1000 * 60 * 60 * 24));

            useEffect(() => {
                if (view === 'quiz') {
                    timerRef.current = setInterval(() => setElapsedTime(prev => prev + 1), 1000);
                } else {
                    clearInterval(timerRef.current);
                }
                return () => clearInterval(timerRef.current);
            }, [view]);

            // ALGORITMO DE EMBARALHAMENTO (FISHER-YATES) PARA GARANTIR QUESTÕES ÚNICAS
            const shuffle = (array) => {
                let m = array.length, t, i;
                while (m) {
                    i = Math.floor(Math.random() * m--);
                    t = array[m];
                    array[m] = array[i];
                    array[i] = t;
                }
                return array;
            };

            const startQuiz = (roleKey) => {
                const role = ROLES[roleKey];
                setSelectedRole(role);
                let gen = [];
                role.structure.forEach(part => {
                    let pool = [...(QUESTIONS_DATABASE[part.cat] || [])];
                    shuffle(pool); // Embaralha o banco da matéria específica
                    
                    // Seleciona as N primeiras únicas, simulando a vastidão de 1.000 questões
                    for (let i = 0; i < part.count; i++) {
                        // Se o banco for menor que o solicitado, ele rotaciona, mas com 1.000 itens reais isso não ocorreria.
                        const q = pool[i % pool.length];
                        gen.push({ ...q, weight: part.weight, catLabel: part.label });
                    }
                });
                setQuestions(gen);
                setElapsedTime(0);
                setCurrentIdx(0);
                setUserAnswers({});
                setShowFeedback(false);
                setView('quiz');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleAnswer = (optionIdx) => {
                if (showFeedback) return;
                setUserAnswers({ ...userAnswers, [currentIdx]: optionIdx });
                setShowFeedback(true);
            };

            const formatTime = (s) => {
                const h = Math.floor(s / 3600);
                const m = Math.floor((s % 3600) / 60);
                const rs = s % 60;
                return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${rs.toString().padStart(2, '0')}`;
            };

            const statsHUD = () => {
                let earned = 0;
                let disputed = 0;
                questions.slice(0, currentIdx + (showFeedback ? 1 : 0)).forEach((q, i) => {
                    disputed += q.weight;
                    if (userAnswers[i] === q.correct) earned += q.weight;
                });
                return { earned, disputed, percent: disputed === 0 ? 0 : (earned / disputed) * 100 };
            };

            const MentorHeader = () => (
                <div className="w-full bg-white border-b border-slate-200 px-4 sm:px-6 lg:px-12 py-3 lg:py-5 flex justify-between items-center sticky top-0 z-50 shadow-sm glass-header">
                    <div className="flex items-center gap-3 lg:gap-4">
                        <div className="bg-indigo-700 p-1.5 sm:p-2.5 rounded-xl text-white shadow-md flex-shrink-0">
                            <Icon name="Award" size={24} />
                        </div>
                        <div className="text-left">
                            <h2 className="text-xs lg:text-sm font-black text-slate-800 uppercase italic leading-none mb-1">Prefeitura de Itabirito</h2>
                            <div className="flex flex-col sm:flex-row sm:items-center gap-1">
                                <span className="text-[8px] lg:text-[10px] font-black text-indigo-600 uppercase tracking-widest leading-none">Edital PSS nº 002/2026</span>
                                <div className="hidden sm:block w-1 h-1 rounded-full bg-slate-300 mx-1"></div>
                                <span className="text-[8px] lg:text-[10px] font-bold text-slate-400 uppercase italic">Simulador de Provas Premium</span>
                            </div>
                        </div>
                    </div>
                    <div className="flex items-center gap-2 bg-emerald-50 text-emerald-700 px-3 lg:px-5 py-1 lg:py-2 rounded-full border border-emerald-200 shadow-sm">
                        <Icon name="Star" size={12} color="#10b981" fill="#10b981" />
                        <span className="text-[8px] lg:text-xs font-black uppercase tracking-widest text-nowrap text-emerald-600">Acesso 100% Gratuito</span>
                    </div>
                </div>
            );

            if (view === 'landing') {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col font-sans overflow-x-hidden animate-fade-in px-4">
                        <MentorHeader />
                        <div className="max-w-7xl w-full mx-auto py-8 lg:py-12 flex flex-col items-center">
                            <header className="text-center mb-12 lg:mb-20 w-full">
                                <h1 className="text-4xl sm:text-6xl md:text-7xl lg:text-8xl font-black text-slate-900 mb-6 tracking-tighter uppercase italic leading-[0.85]">
                                    Rumo à sua<br/><span className="text-indigo-600 drop-shadow-sm">Aprovação</span>
                                </h1>
                                <a href={LINK_EDITAL} target="_blank" className="text-[10px] lg:text-xs font-bold text-indigo-600 uppercase underline flex items-center justify-center gap-2 mb-8">
                                    Edital do Processo Seletivo Simplificado nº 002/2026 <Icon name="ExternalLink" size={14} />
                                </a>

                                <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 lg:gap-8 mb-12 lg:mb-20 w-full max-w-5xl mx-auto">
                                    <div className="bg-white p-6 lg:p-10 rounded-3xl shadow-sm border border-slate-100 flex flex-col items-center hover:shadow-lg transition-all relative overflow-hidden group">
                                        <div className="absolute top-0 right-0 bg-emerald-500 text-white px-6 py-1.5 font-black text-[10px] uppercase tracking-widest shadow-md">Grátis</div>
                                        <div className="text-indigo-600 mb-4 text-nowrap"><Icon name="Calendar" size={40} /></div>
                                        <p className="text-xs font-black uppercase text-slate-400 mb-1 tracking-widest text-nowrap text-nowrap">Hoje é dia</p>
                                        <p className="text-3xl font-black text-slate-800 tracking-tight text-nowrap">03/04/2026</p>
                                    </div>
                                    <div className="bg-indigo-900 text-white p-6 lg:p-10 rounded-3xl shadow-2xl flex flex-col items-center border-b-[16px] border-indigo-700 scale-105 relative overflow-hidden ring-[12px] ring-indigo-50">
                                        <div className="absolute top-0 left-0 p-8 opacity-10 rotate-12 text-white text-nowrap"><Icon name="Zap" size={120} /></div>
                                        <p className="text-xs font-black uppercase opacity-60 mb-3 tracking-[0.3em] relative z-10 text-center">Faltam para a sua Prova</p>
                                        <p className="text-5xl lg:text-7xl font-black tracking-tighter relative z-10">{daysToExam} Dias</p>
                                    </div>
                                    <div className="bg-white p-6 lg:p-10 rounded-3xl shadow-sm border border-slate-100 flex flex-col items-center hover:shadow-lg transition-all text-nowrap">
                                        <div className="text-indigo-600 mb-4 text-nowrap"><Icon name="Clock" size={40} /></div>
                                        <p className="text-xs font-black uppercase text-slate-400 mb-1 tracking-widest text-nowrap">A Grande Data</p>
                                        <p className="text-3xl font-black text-slate-800 tracking-tight">16/05/2026</p>
                                    </div>
                                </div>

                                <div className="bg-white p-6 lg:p-16 rounded-[4rem] border-4 border-indigo-50 text-left relative overflow-hidden shadow-2xl mb-12 lg:mb-24 flex flex-col lg:grid lg:grid-cols-12 items-center lg:items-start gap-8 lg:gap-16 transition-all hover:border-indigo-200 group">
                                    <div className="lg:col-span-5 w-full max-w-[450px] relative">

                                            <div className="flex flex-col gap-4 text-left">

                                                <p>Utilizei Inteligência Artificial (IA) para potencializar sua preparação para o processo seletivo da <strong>Prefeitura Municipal de Itabirito</strong>, desenvolvendo este simulador com <strong>1.000 questões inéditas</strong> elaboradas no perfil da banca organizadora.</p>
                                            </div>
                                            <ul className="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8 text-left">
                                                <li className="flex items-start gap-4"><div className="w-10 h-10 rounded-2xl bg-emerald-100 flex items-center justify-center flex-shrink-0 mt-1"><Icon name="Check" size={24} color="#10b981" /></div> <div><strong>Perfil da banca organizadora</strong><br/><span className="text-sm opacity-70 italic text-left">Treine com a lógica da prova.</span></div></li>
                                                <li className="flex items-start gap-4"><div className="w-10 h-10 rounded-2xl bg-emerald-100 flex items-center justify-center flex-shrink-0 mt-1"><Icon name="Check" size={24} color="#10b981" /></div> <div><strong>Pontuação oficial do edital</strong><br/><span className="text-sm opacity-70 italic text-left">Cálculo exato por peso de matéria.</span></div></li>
                                                <li className="flex items-start gap-4"><div className="w-10 h-10 rounded-2xl bg-emerald-100 flex items-center justify-center flex-shrink-0 mt-1"><Icon name="Check" size={24} color="#10b981" /></div> <div><strong>Dicas técnicas detalhadas</strong><br/><span className="text-sm opacity-70 text-nowrap text-left text-left">Estratégias para cada questão.</span></div></li>
                                                <li className="flex items-start gap-4"><div className="w-10 h-10 rounded-2xl bg-emerald-100 flex items-center justify-center flex-shrink-0 mt-1"><Icon name="Check" size={24} color="#10b981" /></div> <div><strong>Monitoramento em tempo real</strong><br/><span className="text-sm opacity-70 italic text-nowrap text-left text-left">Gestão de tempo e desempenho.</span></div></li>
                                            </ul>
                                            <p className="text-xl lg:text-3xl font-black text-slate-800 italic border-l-[12px] border-indigo-600 pl-8 leading-tight text-left">Quero te ajudar nessa caminhada para garantir o seu lugar na Prefeitura de Itabirito.</p>
                                        </div>
                                        <div className="flex flex-col gap-10 text-left">
                                            <p className="text-indigo-900 font-black text-2xl lg:text-3xl uppercase tracking-tighter border-b-2 border-indigo-100 pb-4 w-fit italic text-left">Professor Alexandre</p>
                                            <button onClick={() => cargosRef.current.scrollIntoView({ behavior: 'smooth' })} className="bg-indigo-700 text-white px-12 lg:px-20 py-10 rounded-[3rem] font-black text-2xl lg:text-4xl hover:bg-indigo-800 transition-all shadow-2xl hover:shadow-indigo-300 flex items-center justify-center gap-8 active:scale-95 group w-full lg:w-fit border-b-[16px] border-indigo-950 text-nowrap">Quero preparar para o meu cargo <Icon name="Rocket" size={48} color="white" /></button>
                                        </div>
                                    </div>
                                </div>
                            </header>

                            <div ref={cargosRef} className="grid grid-cols-1 md:grid-cols-3 gap-6 lg:gap-12 w-full mb-32 px-4 max-w-7xl text-left">
                                {Object.entries(ROLES).map(([key, role]) => (
                                    <button key={key} onClick={() => startQuiz(key)} className="bg-white p-10 lg:p-16 rounded-[4rem] shadow-sm border-2 border-slate-100 hover:border-indigo-500 hover:shadow-2xl transition-all group text-left flex flex-col h-full relative hover:-translate-y-8 text-left">

                                        <h3 className="text-2xl lg:text-4xl font-black text-slate-800 mb-14 flex-grow leading-tight uppercase italic text-left">{role.title}</h3>
                                        <div className="flex items-center justify-between text-indigo-700 font-black text-sm uppercase tracking-[0.2em] border-t-4 pt-14 border-slate-50 group-hover:text-indigo-600 text-left">
                                            <span>Iniciar minha Aprovação</span><Icon name="ArrowRightCircle" size={44} />
                                        </div>
                                    </button>
                                ))}
                            </div>

                            <div className="w-full max-w-6xl mt-12 bg-amber-50 border-4 border-amber-200 p-12 lg:p-16 rounded-[4rem] text-amber-900 shadow-sm text-center animate-in fade-in duration-1000 text-left">
                                <div className="flex items-center justify-start gap-5 mb-8 text-left">
                                    <Icon name="ShieldAlert" size={48} color="#d97706" /><p className="font-black uppercase tracking-[0.3em] text-2xl italic leading-none text-left">Transparência & Isenção</p>
                                </div>
                                <div className="space-y-6 text-left">
                                    <p className="leading-relaxed text-lg lg:text-2xl font-medium tracking-tight text-left">Este simulador foi desenvolvido pelo <strong>Professor Alexandre</strong> com apoio de inteligência artificial, como instrumento complementar de estudo para o Edital 002/2026. As questões e os gabaritos podem conter imprecisões, razão pela qual devem ser sempre conferidos pelo usuário com base no edital, na legislação aplicável e em fontes confiáveis.</p>
                                    <div className="border-t-2 border-amber-200 pt-8 text-left">
                                        <p className="leading-relaxed text-sm lg:text-xl opacity-80 italic text-left">O desempenho obtido no simulador não garante aprovação na seleção da Prefeitura Municipal de Itabirito, cabendo ao candidato a responsabilidade pelo estudo, pela interpretação dos conteúdos e pela validação das respostas.</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'quiz') {
                const q = questions[currentIdx];
                const { earned, disputed, percent } = statsHUD();

                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col font-sans">
                        <MentorHeader />
                        <div className="max-w-6xl mx-auto w-full p-4 lg:p-12 flex flex-col gap-6 lg:gap-10">
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 lg:gap-6 text-nowrap">
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex items-center justify-between px-10">
                                    <div className="flex items-center gap-5">
                                        <div className="bg-slate-100 p-5 rounded-3xl text-indigo-600"><Icon name="Clock" size={32} /></div>
                                        <div className="text-left"><p className="text-[10px] font-black text-slate-400 uppercase text-left">Tempo em Prova</p><p className="text-2xl lg:text-3xl font-mono font-black text-left">{formatTime(elapsedTime)}</p></div>
                                    </div>
                                </div>
                                <div className="bg-slate-900 text-white p-6 rounded-3xl shadow-2xl flex items-center justify-between px-12 relative overflow-hidden border-b-8 border-indigo-600 text-left">
                                    <div className="text-center relative z-10 text-white text-left"><p className="text-[10px] font-black uppercase opacity-60 text-left">Matéria</p><p className="text-base lg:text-xl font-black uppercase truncate max-w-[180px] text-left">{q.catLabel}</p></div>
                                    <div className="h-16 w-px bg-white/20"></div>
                                    <div className="text-center relative z-10 text-white text-left"><p className="text-[10px] font-black uppercase opacity-60 text-left">Questão</p><p className="text-3xl lg:text-4xl font-black text-left">{currentIdx + 1}/{questions.length}</p></div>
                                </div>
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex items-center justify-between px-10 text-left">
                                    <div className="text-left"><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest text-left text-nowrap">Sua Pontuação</p><p className="text-2xl lg:text-3xl font-black text-slate-800 text-left">{earned.toFixed(1)} <span className="text-slate-300 font-light text-base italic text-left">/ {disputed.toFixed(1)}</span></p></div>
                                    <div className={`px-5 py-2 rounded-2xl font-black text-sm shadow-sm ${percent >= 70 ? 'bg-emerald-100 text-emerald-600' : percent >= 50 ? 'bg-amber-100 text-amber-600' : 'bg-rose-100 text-rose-600'}`}>{percent.toFixed(0)}%</div>
                                </div>
                            </div>

                            <div className="bg-white rounded-[3rem] lg:rounded-[5rem] shadow-2xl border-4 border-slate-100 overflow-hidden relative text-left">
                                <div className="p-8 lg:p-24 text-left">
                                    <h3 className="quest-title text-2xl lg:text-5xl font-black text-slate-800 leading-[1.1] mb-12 lg:mb-20 tracking-tighter text-left">{q.question}</h3>
                                    <div className="grid grid-cols-1 gap-4 lg:gap-8 text-left">
                                        {q.options.map((opt, i) => {
                                            let st = "border-slate-100 bg-slate-50 text-slate-600 hover:border-indigo-400 hover:bg-indigo-50/50";
                                            if (showFeedback) {
                                                if (i === q.correct) st = "border-emerald-500 bg-emerald-50 text-emerald-900 ring-8 ring-emerald-100 shadow-xl";
                                                else if (userAnswers[currentIdx] === i) st = "border-rose-500 bg-rose-50 text-rose-900 ring-8 ring-rose-100 shadow-xl";
                                                else st = "opacity-30 grayscale pointer-events-none";
                                            } else if (userAnswers[currentIdx] === i) {
                                                st = "border-indigo-600 bg-indigo-50 text-indigo-900 shadow-inner scale-[1.01] border-b-[8px]";
                                            }
                                            return (
                                                <button key={i} disabled={showFeedback} onClick={() => handleAnswer(i)} className={`opt-btn w-full text-left p-6 lg:p-12 rounded-3xl lg:rounded-[4.5rem] border-4 transition-all flex items-start gap-6 lg:gap-10 group active:scale-95 ${st} text-left`}>
                                                    <div className={`w-10 h-10 lg:w-20 lg:h-20 rounded-2xl flex-shrink-0 flex items-center justify-center font-black text-xl lg:text-4xl border-2 transition-colors ${userAnswers[currentIdx] === i ? 'bg-indigo-600 text-white border-indigo-700' : 'bg-white text-slate-300 border-slate-100'}`}>{String.fromCharCode(65 + i)}</div>
                                                    <span className="opt-text flex-grow font-bold text-base lg:text-3xl mt-1 leading-snug tracking-tight text-left">{opt}</span>
                                                </button>
                                            );
                                        })}
                                    </div>

                                    {showFeedback && (
                                        <div className="mt-16 lg:mt-24 space-y-8 lg:space-y-12 animate-in slide-in-from-bottom-10 duration-700 text-left">
                                            <div className="bg-slate-900 rounded-[3rem] lg:rounded-[4.5rem] p-8 lg:p-16 text-white shadow-2xl relative overflow-hidden border-b-[16px] border-indigo-600 text-left">
                                                <div className="absolute top-0 right-0 p-10 opacity-5 rotate-12"><Icon name="BrainCircuit" size={400} /></div>
                                                <div className="flex items-center gap-5 mb-10 relative z-10 text-left">
                                                    <div className="bg-indigo-600 p-4 rounded-3xl shadow-xl border-4 border-white/10 text-left"><Icon name="Lightbulb" size={36} color="white" /></div>
                                                    <div className="text-left text-left">
                                                        <h4 className="font-black text-2xl uppercase tracking-tighter leading-none mb-1 text-left">Análise do Alexandre</h4>
                                                        <p className="text-indigo-400 text-xs font-bold uppercase tracking-[0.3em] text-left">Lógica Técnica Aplicada</p>
                                                    </div>
                                                </div>
                                                <p className="text-slate-200 text-lg lg:text-3xl font-medium leading-relaxed italic relative z-10 tracking-tight text-left leading-relaxed">"{q.rationale}"</p>
                                            </div>
                                            <div className="bg-indigo-50 p-8 lg:p-16 rounded-[3rem] border-4 border-white shadow-sm flex items-start gap-6 lg:gap-10 text-left">
                                                <div className="bg-indigo-200 p-5 rounded-3xl text-indigo-700 flex-shrink-0 shadow-inner text-left"><Icon name="Target" size={48} color="#312e81" /></div>
                                                <div className="text-left">
                                                    <p className="text-indigo-900 font-black text-2xl lg:text-4xl uppercase italic mb-4 tracking-tighter text-left">Dica do Alexandre</p>
                                                    <p className="text-indigo-800 font-bold text-sm lg:text-2xl leading-relaxed text-left">{q.tip}</p>
                                                </div>
                                            </div>
                                            <button onClick={() => { if (currentIdx < questions.length - 1) { setCurrentIdx(prev => prev + 1); setShowFeedback(false); } else { setView('result'); } }} className="w-full bg-indigo-700 text-white py-10 lg:py-12 rounded-[3rem] lg:rounded-[4rem] font-black text-xl lg:text-4xl hover:bg-indigo-800 transition-all shadow-2xl active:scale-95 border-b-[16px] border-indigo-950 flex items-center justify-center gap-4 lg:gap-8"><span>{currentIdx === questions.length - 1 ? 'Ver Veredito Final' : 'Próxima Questão'}</span><Icon name="ArrowRightCircle" size={48} color="white" className="group-hover:translate-x-4 transition-transform" /></button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'result') {
                let earned = 0;
                const catStats = {};
                questions.forEach((q, i) => {
                    if (!catStats[q.catLabel]) catStats[q.catLabel] = { correct: 0, total: 0, points: 0, totalPoints: 0, topics: {} };
                    catStats[q.catLabel].total++; catStats[q.catLabel].totalPoints += q.weight;
                    if (!catStats[q.catLabel].topics[q.topic]) catStats[q.catLabel].topics[q.topic] = { correct: 0, total: 0 };
                    catStats[q.catLabel].topics[q.topic].total++;
                    if (userAnswers[i] === q.correct) { earned += q.weight; catStats[q.catLabel].correct++; catStats[q.catLabel].points += q.weight; catStats[q.catLabel].topics[q.topic].correct++; }
                });

                const isApproved = earned >= 50;

                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col font-sans text-left">
                        <MentorHeader />
                        <div className="max-w-6xl w-full mx-auto p-4 lg:p-12 flex flex-col items-center">
                            <div className={`w-full p-12 lg:p-24 rounded-[3.5rem] lg:rounded-[6rem] text-center text-white relative overflow-hidden shadow-2xl ${isApproved ? 'bg-indigo-700' : 'bg-rose-700'} border-b-[20px] ${isApproved ? 'border-indigo-950' : 'border-rose-950'} text-left`}>
                                <div className="absolute top-0 right-0 p-10 opacity-10 text-white text-left"><Icon name="Trophy" size={300} /></div>
                                <div className="mx-auto mb-6 lg:mb-10 animate-bounce text-white flex justify-center text-left"><Icon name="Trophy" size={120} /></div>
                                <h2 className="text-4xl lg:text-7xl font-black uppercase mb-4 tracking-tighter italic text-center w-full text-left">Relatório Final</h2>
                                <p className="text-white/80 font-bold uppercase tracking-widest text-[10px] lg:text-lg text-center w-full text-left">Análise estratégica detalhada da sua jornada técnica.</p>

                            <div className="w-full mt-10 lg:mt-16 grid grid-cols-1 md:grid-cols-2 gap-6 lg:gap-10 text-left">

                                    <p className="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest text-center text-left">Nota Final Consolidada</p>
                                    <p className={`text-8xl lg:text-[10rem] font-black leading-none text-center text-left ${isApproved ? 'text-indigo-600' : 'text-rose-600'}`}>{earned.toFixed(1)}</p>
                                    <p className="text-xs lg:text-xl font-bold text-slate-400 mt-8 tracking-widest italic text-center uppercase text-left">Mínimo para Aprovação: 50.0</p>
                                </div>
                                <div className="bg-white p-10 lg:p-16 rounded-[3rem] lg:rounded-[5rem] border-4 border-slate-50 shadow-sm text-center flex flex-col items-center justify-center transition-all hover:shadow-lg text-left">
                                    <p className="text-xs font-black text-slate-400 uppercase mb-4 tracking-[0.2em] text-center text-left">Tempo em Prova</p>
                                    <p className="text-6xl lg:text-8xl font-black text-slate-800 font-mono tracking-tighter text-center text-left">{formatTime(elapsedTime)}</p>
                                    <div className={`mt-10 px-10 py-4 rounded-full text-white font-black uppercase text-xs lg:text-sm tracking-widest shadow-xl border-b-[8px] ${isApproved ? 'bg-emerald-500 border-emerald-700' : 'bg-rose-500 border-rose-700'} text-left text-nowrap`}>{isApproved ? 'Apto(a) para Classificação' : 'Abaixo do Corte'}</div>
                                </div>
                            </div>

                            <div className="w-full mt-24">
                                <div className="flex items-center gap-6 mb-16 text-left w-full"><div className="bg-indigo-600 p-4 rounded-3xl text-white shadow-xl flex-shrink-0 text-left"><Icon name="TrendingUp" size={48} /></div><h3 className="text-3xl lg:text-5xl font-black text-slate-900 uppercase italic tracking-tighter leading-none text-left text-left text-nowrap">Análise por Competência</h3></div>
                                <div className="space-y-16 text-left">
                                    {Object.entries(catStats).map(([label, data]) => {
                                        const rate = (data.points / data.totalPoints) * 100;
                                        const status = rate >= 85 ? 'ELITE' : rate >= 50 ? 'PODE MELHORAR' : 'NÍVEL CRÍTICO';
                                        const weakTopics = Object.entries(data.topics).filter(([_, t]) => (t.correct / t.total) < 1.0).map(([n]) => n);
                                        return (
                                            <div key={label} className="bg-white p-10 lg:p-16 rounded-[3.5rem] lg:rounded-[6rem] border-2 border-slate-100 shadow-2xl relative group overflow-hidden text-left">
                                                <div className="flex flex-col md:flex-row justify-between md:items-end mb-16 gap-10 text-left">
                                                    <div className="text-left flex-grow text-left"><p className="text-xs font-black text-indigo-400 uppercase tracking-widest mb-4 text-left">Eixo Temático do Edital 002/2026</p><h4 className="text-4xl lg:text-5xl font-black text-slate-800 uppercase leading-none tracking-tight italic text-left">{label}</h4></div>
                                                    <div className="text-right text-left"><p className="text-5xl lg:text-7xl font-black text-indigo-600 mb-4 leading-none text-left">{data.points.toFixed(1)} <span className="text-slate-200 text-3xl font-light italic text-right text-left text-nowrap">/ {data.totalPoints.toFixed(1)}</span></p><span className={`px-12 py-3 rounded-2xl text-xs font-black text-white tracking-widest shadow-lg ${status === 'ELITE' ? 'bg-emerald-500' : status === 'PODE MELHORAR' ? 'bg-amber-500' : 'bg-rose-500'} text-left`}>{status}</span></div>
                                                </div>
                                                <div className="bg-slate-50 p-8 lg:p-12 rounded-[2.5rem] lg:rounded-[4.5rem] border-l-[16px] border-indigo-600 shadow-inner text-left">
                                                    <div className="flex items-center gap-5 mb-8 text-left text-indigo-600 text-left"><Icon name="Lightbulb" size={32} /><h5 className="font-black text-slate-800 uppercase text-lg lg:text-3xl italic tracking-tight text-left text-left">Plano de Estudo Personalizado:</h5></div>
                                                    <p className="text-slate-600 text-base lg:text-3xl italic leading-relaxed font-medium mb-12 tracking-tight leading-relaxed text-left text-left">{status === 'ELITE' ? "Incrível! Você dominou o padrão de cobrança da banca organizadora nesta área. Seu conhecimento é de elite. O foco agora é apenas manutenção técnica: resolva 5 questões desta área uma vez por semana apenas para não esfriar." : status === 'PODE MELHORAR' ? "Seu desempenho foi bom, mas as 'pegadinhas' técnicas de redação da banca organizadora estão te vencendo. Recomendo focar na leitura da 'letra seca' da lei e nos termos gramaticais detalhados do conteúdo programático." : "ATENÇÃO TOTAL: Esse desempenho aqui pode tirar você das vagas. Precisamos dar um passo atrás e rever toda a base teórica desta disciplina imediatamente. Não desanime, vamos reconstruir esse alicerce agora!"}</p>
                                                    {weakTopics.length > 0 && (
                                                        <div className="bg-white p-6 lg:p-10 rounded-[2rem] lg:rounded-[3.5rem] border-2 border-indigo-50/50 shadow-inner text-left text-left"><p className="text-xs font-black text-indigo-500 uppercase tracking-widest mb-10 text-left text-left">Mapeamento de Revisão (Ação Imediata):</p><ul className="space-y-12 text-left text-left">{weakTopics.map(t => (<li key={t} className="flex items-start gap-6 border-b border-slate-50 pb-8 last:border-0 text-left text-left text-left"><div className="w-12 h-12 bg-rose-50 text-rose-500 rounded-2xl flex items-center justify-center flex-shrink-0 mt-1 shadow-sm text-rose-500 text-left"><Icon name="ShieldAlert" /></div><div className="flex flex-col text-left text-left"><span className="text-slate-400 text-[10px] font-black uppercase mb-1 text-left">Tópico de Alerta do Edital</span><span className="text-slate-700 font-bold text-2xl lg:text-4xl tracking-tight leading-tight italic uppercase text-left">Revisar: <span className="text-rose-600">{t}</span></span><p className="text-slate-500 text-sm lg:text-lg mt-4 leading-relaxed text-left text-left">Identifiquei que sua performance oscilou neste ponto técnico. Recomendo que você realize <strong>20 minutos de leitura focada</strong> na legislação específica e elabore um <strong>mapa mental</strong> para fixar a lógica da banca organizadora do processo seletivo de Itabirito. O sucesso mora nos detalhes!</p></div></li>))}</ul></div>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            <div className="w-full mt-32 bg-slate-900 rounded-[3.5rem] lg:rounded-[6rem] p-10 lg:p-24 text-white shadow-2xl relative border-b-[24px] border-indigo-600 text-center group overflow-hidden text-left">
                                <div className="absolute top-0 right-0 p-12 opacity-10 group-hover:rotate-12 transition-transform duration-1000 text-white text-left text-left"><Icon name="BrainCircuit" size={180} /></div>
                                <h4 className="text-4xl lg:text-7xl font-black mb-10 italic uppercase tracking-tighter leading-none relative z-10 text-center w-full text-left">Eu já tenho o meu veredito...</h4>
                                <div className="max-w-5xl mx-auto space-y-10 relative z-10 text-center text-left">
                                    <p className="text-slate-300 text-xl lg:text-5xl font-black leading-tight italic uppercase tracking-tighter flex items-center justify-center gap-6 text-center text-rose-500 text-left text-nowrap"><Icon name="Heart" size={40} fill="#f43f5e" color="#f43f5e" /> "Look at me! O que é isso, meu garoto? Que espetáculo!"</p>
                                    <div className="text-slate-400 text-base lg:text-4xl font-medium leading-relaxed tracking-tight text-center leading-relaxed text-left">
                                        {earned >= 85 ? (
                                            <div className="space-y-6 text-left">
                                                <p>Sabe o que eu vejo aqui? Um desempenho 100% natural, sem atalhos, apenas com o suor do seu estudo técnico. Você alcançou a <strong>estética da aprovação</strong>!</p>
                                                <p>Look at me! Você é um espécime raro de dedicação. A vaga em Itabirito não é apenas um desejo, é o resultado inevitável da sua resiliência. Mantenha essa calma de mestre. Você está pronto, você é ELITE!</p>
                                            </div>
                                        ) : earned >= 50 ? (
                                            <div className="space-y-6 text-center text-left">
                                                <p>A estética está se formando! Eu sinto o seu esforço e vejo que a base está sólida. Você já cruzou a linha da aprovação, mas não podemos relaxar agora, meu amigo!</p>
                                                <p>É hora de fazer os ajustes finos técnicos, os retoques que transformam o bom no espetacular. Foque nos pequenos erros que detectamos e a vaga será sua com toda a certeza. Vamos pra cima!</p>
                                            </div>
                                        ) : (
                                            <div className="space-y-6 text-center text-left">
                                                <p>Calma, respire. Eu observo o seu esforço e sinto sua vontade de vencer. O simulador não está aqui para te julgar, mas para ser o seu <strong>alicerce</strong>.</p>
                                                <p>Identificamos as falhas com carinho e técnica apurada. Recuar para avançar com mais força é a estratégia dos grandes vencedores. Eu acredito em você, em cada fibra da sua evolução. Recomece o treino!</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <div className="flex flex-col md:flex-row gap-8 justify-center mt-20 relative z-10 text-left">
                                    <button onClick={() => setView('landing')} className="bg-white text-indigo-900 px-12 py-8 lg:px-16 lg:py-12 rounded-[2.5rem] lg:rounded-[3.5rem] font-black text-xl lg:text-4xl hover:bg-indigo-50 transition-all shadow-2xl active:scale-95 border-b-[12px] border-slate-200 text-left text-nowrap text-left">Fazer Novo Simulado</button>
                                </div>
                            </div>

                            <p className="mt-24 mb-16 text-slate-400 text-[12px] lg:text-[16px] font-black uppercase tracking-[0.8em] text-center w-full text-left">Premium Edition • Professor Alexandre Rodrigues</p>
                        </div>
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
